name: Update Wizard Graph

on:
  workflow_dispatch:
    inputs:
      change_description:
        description: 'Describe the changes to wizardGraph.json'
        required: true
        type: string
      json_content:
        description: 'The updated JSON content'
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-wizard-graph:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Validate JSON syntax
        env:
          JSON_CONTENT: ${{ inputs.json_content }}
        run: |          
          if ! printf "%s" "$JSON_CONTENT" | jq empty; then            
            echo "❌ Invalid JSON syntax"            
            exit 1          
          fi

      - name: Verify file integrity
        env:
          JSON_CONTENT: ${{ inputs.json_content }}
        run: |          
          printf "%s" "$JSON_CONTENT" | jq -e '.nodes and .edges' > /dev/null || exit 1          
          echo "✅ wizardGraph.json has valid structure"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update ONLY wizardGraph.json
        env:
          JSON_CONTENT: ${{ inputs.json_content }}
        run: |          
          # Write the JSON content
          printf "%s" "$JSON_CONTENT" | jq '.' > wizardGraph.json
          
          # Verify ONLY this file changed
          if [ $(git diff --name-only | wc -l) -ne 1 ]; then
            echo "❌ ERROR: More than one file was modified!"
            exit 1
          fi
          
          if [ "$(git diff --name-only)" != "wizardGraph.json" ]; then
            echo "❌ ERROR: Modified file is not wizardGraph.json!"
            exit 1
          fi

      - name: Commit changes
        run: |
          git add wizardGraph.json
          git commit -m "chore: update wizardGraph.json
          
          Reason: ${{ inputs.change_description }}"
          git push origin main
