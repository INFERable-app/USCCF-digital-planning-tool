name: Update Wizard Graph

on:
  # Trigger manually from GitHub UI
  workflow_dispatch:
    inputs:
      change_description:
        description: 'Describe the changes to wizardGraph.json'
        required: true
        type: string
  
  # Or trigger on push to a specific branch (e.g., graph-updates)
  push:
    branches:
      - graph-updates
    paths:
      - 'wizardGraph.json'

permissions:
  contents: write  # Only allow writing to repository contents
  pull-requests: write  # Allow creating/updating PRs

jobs:
  update-wizard-graph:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate JSON syntax
        run: |
          if ! jq empty wizardGraph.json; then
            echo "❌ Invalid JSON syntax in wizardGraph.json"
            exit 1
          fi
          echo "✅ JSON syntax is valid"

      - name: Verify file integrity
        run: |
          # Ensure required fields exist
          jq -e '.nodes and .edges' wizardGraph.json > /dev/null || exit 1
          echo "✅ wizardGraph.json has valid structure (nodes and edges)"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit changes to main
        run: |
          if git diff --quiet wizardGraph.json; then
            echo "No changes detected in wizardGraph.json"
          else
            git add wizardGraph.json
            git commit -m "chore: update wizardGraph.json
            
            Reason: ${{ inputs.change_description || 'Automated update' }}
            Triggered by: ${{ github.actor }}"
            git push origin main
          fi

      - name: Report completion
        run: |
          echo "✅ Wizard Graph update workflow completed"
          echo "📝 File: wizardGraph.json"
          echo "🔐 Only this file was modified"
