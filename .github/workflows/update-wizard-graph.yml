name: Update Wizard Graph

on:
  workflow_dispatch:
    inputs:
      change_description:
        description: 'Describe the changes to wizardGraph.json'
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-wizard-graph:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Validate JSON syntax
        run: |
          if ! jq empty wizardGraph.json; then
            echo "❌ Invalid JSON syntax in wizardGraph.json"
            exit 1
          fi
          echo "✅ JSON syntax is valid"

      - name: Verify file integrity
        run: |
          jq -e '.nodes and .edges' wizardGraph.json > /dev/null || exit 1
          echo "✅ wizardGraph.json has valid structure"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit changes to main
        run: |
          if git diff --quiet wizardGraph.json; then
            echo "No changes detected"
          else
            git add wizardGraph.json
            git commit -m "chore: update wizardGraph.json

            Reason: ${{ inputs.change_description }}"
            git push origin main
          fi
