services:
  app:
    build:
      context: .
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    container_name: usccf-planning-tool
    ports:
      - "8080:80"

  gateway:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: usccf-gateway
    environment:
      PORT: 3001
      SESSION_SECRET: ${SESSION_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      GRAPH_BACKEND: neo4j
      WEB_ORIGIN: ${WEB_ORIGIN}
      NODE_ENV: production
      ADMIN_EMAILS: ${ADMIN_EMAILS}
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      - neo4j

  neo4j:
    image: neo4j:5
    container_name: usccf-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_server_memory_pagecache_size: 32m
      NEO4J_server_memory_heap_initial__size: 96m
      NEO4J_server_memory_heap_max__size: 96m
    ports:
      - "127.0.0.1:7687:7687"
      - "127.0.0.1:7474:7474"
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data:
